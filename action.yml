name: "docs-version-deploy"
description: "Deploy versioned static documentation to any GitHub repository"
author: "yukiakai212"

inputs:
  docsDir:
    description: "Directory containing the built static documentation"
    required: true

  targetRepository:
    description: "Target GitHub repository to deploy documentation into"
    required: true

  branch:
    description: "Target branch used for deployment"
    required: true

  version:
    description: "Documentation version name"
    required: true

  targetDir:
    description: "Target directory inside the deployment repository"
    required: false
    default: "."

  markAsLatest:
    description: "Mark this version as the latest version"
    required: false
    default: "false"

  commitMessage:
    description: "Custom git commit message"
    required: false

  group:
    description: "Optional version group name"
    required: false

  cleanupStrategy:
    description: "Cleanup strategy applied before publishing"
    required: false

  writeStaticFiles:
    description: "Write shared static runtime files (index/assets/latest)"
    required: false
    default: "true"

  token:
    description: "GitHub token with repository write access"
    required: true

runs:
  using: "node24"
  main: "dist/action/action.cjs"